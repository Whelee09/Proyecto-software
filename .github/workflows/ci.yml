name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit tests (backend)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: collabboard/backend/package-lock.json

      - name: Install dependencies
        working-directory: collabboard/backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: collabboard/backend
        run: npm run prisma:generate

      - name: Run tests
        working-directory: collabboard/backend
        run: npm test -- --passWithNoTests
