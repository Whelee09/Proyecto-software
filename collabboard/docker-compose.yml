services:
  postgres:
    image: postgres:16-alpine
    container_name: collabboard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: collabboard
      POSTGRES_PASSWORD: collabboard
      POSTGRES_DB: collabboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

